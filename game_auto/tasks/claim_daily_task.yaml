            page: congrats_popup
            fallback: {action: skip}

  # 11. 浏览好物5秒领奖励（多次任务，浏览 7 秒：点击+滑动共约7秒）
  - name: 浏览好物5秒领奖励
    loop: 20
    loop_steps:
      - name: 确保在弹窗中
        action: ensure_page
        target_page: daily_task_popup
        max_back_attempts: 2
        recovery: return_to_game_main
        entry_find:
          type: ocr
          text: "任务"
          roi: [500, 1400, 180, 120]
          threshold: 0.4
        entry_wait: 2
      - <<: *close_surprise_gift
      - <<: *scroll_find_go_finish
        name: 滚动查找浏览好物5秒领奖励去完成
        anchor_text: "浏览好物5秒领奖励"
      - <<: *check_and_merge
      - name: 验证是否已离开每日任务弹窗
        action: if_found
        find:
          type: ocr
          text: "每日任务"
          roi: [250, 450, 220, 120]
          threshold: 0.4
        then_steps:
          - name: 仍在弹窗中，跳过浏览
            action: wait
            duration: 1
        else_steps:
          - <<: *handle_ad_reward
            else_steps:
              - name: 检测广告浏览弹窗
                page: browse_ad_popup
                fallback: {action: skip}
              - name: 等待浏览
                action: browse
                duration: 7
          - name: 返回每日任务弹窗
            action: return_to_task
            wait_after: 2
          - <<: *close_mgc_overlay
          - name: 处理去看看弹窗
            page: browse_congrats_popup
            fallback: {action: skip}
          - name: 关闭开心收下弹窗
            page: congrats_popup
            fallback: {action: skip}

  # 12. 最后关闭可能残留的弹窗，返回主界面
  - page: congrats_popup
    fallback: {action: skip}
    wait_after: 2
  - name: 返回主界面
    action: back
    wait_after: 2
