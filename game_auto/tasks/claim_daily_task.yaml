  # 10. 完成浏览领奖励（多次任务，浏览 12 秒）
  - name: 完成浏览领奖励
    loop: 20
    loop_steps:
      - name: 确保在弹窗中
        action: ensure_page
        target_page: daily_task_popup
        max_back_attempts: 2
