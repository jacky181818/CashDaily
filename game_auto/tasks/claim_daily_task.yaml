        entry_wait: 2
      - <<: *close_surprise_gift
      - <<: *scroll_find_go_finish
        name: 滚动查找浏览30秒领精灵球去完成
        anchor_text: "浏览30秒领精灵球"
      - <<: *check_and_merge
      - name: 验证是否已离开每日任务弹窗
        action: if_found
