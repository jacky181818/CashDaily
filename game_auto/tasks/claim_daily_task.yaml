name: 领取每日任务奖励
description: 进入游戏 → 主界面点击任务按钮 → 领取所有奖励 → 完成清单中的浏览任务

# 可复用：检测到放置区满后，返回主界面执行一键合成，再重新打开任务弹窗
check_and_merge: &check_and_merge
  name: 检测放置区满并执行一键合成
  action: if_found
  # 复用上一步(tap 去完成/去领取)后的截图来检测 toast：
  # “放置区已满”提示是点击后立即弹出、约 1~2 秒后消失的短命 toast，
  # 若 if_found 重新截图会错过它。复用截图即可稳定捕捉；未命中再新截一张兜底。
  use_last_screenshot: true
  find:
    type: ocr
    # 天天现金的“放置区已满”提示有两种文案，任意命中其一即触发一键合成。
    text:
      - "放置区角色已达上限"
      - "放置区精灵已满"
    threshold: 0.5
  then_steps:
    - name: 关闭每日任务弹窗
      action: tap
      find:
        type: template
        template: close_btn_daily_task.png
        process: raw
        threshold: 0.85
      skip_if_not_found: true
      wait_after: 2
    - name: 执行一键合成
      action: run_subtask
      task: merge_all.yaml
    - name: 重新打开任务弹窗
      action: tap
      find:
        type: ocr
        text: "任务"
        roi: [500, 1400, 180, 120]
        threshold: 0.4
      wait_after: 2

# 可复用：关闭美团“其他小游戏”内同 Activity 浮层（右上角圆圈按钮）
# 注意：圆圈按钮在【天天现金主游戏】的每日任务弹窗上 = “关闭整个游戏”按钮，绝不能点！
# 只有当跳到美团【其他小游戏】（Activity 为 MGCGameActivity1/... 带后缀，非天天现金）时，
# 才需要点圆圈按钮关闭浮层回到天天现金。引擎动作 close_mgc_overlay 会先判定当前 Activity：
#   - 当前 == 天天现金主游戏(MGCGameActivity) → 跳过（否则会误关游戏）
#   - 当前 == 美团其他小游戏(MGCGameActivity1/...) → 检测并点圆圈(固定坐标)关闭
#   - 当前不在美团(第三方App) → return_to_task 已处理，跳过
# 圆圈按钮位置固定（x:620 y:45 w:70 h:55 → 中心 (655,72)）。
close_mgc_overlay: &close_mgc_overlay
  name: 关闭美团其他小游戏浮层圆圈按钮
  action: close_mgc_overlay
  find:
    type: template
    template: close_btn_mgc_overlay.png
    process: raw
    threshold: 0.8
    roi: [610, 35, 90, 80]      # 右上角圆圈按钮区域（按固定位置缩小搜索范围）
  close_coords: [655, 72]       # 圆圈按钮中心（x:620 y:45 w:70 h:55 → 中心约 (655,72)）
  wait_after: 2

# 可复用：关闭"惊喜礼包"弹窗（该弹窗可能覆盖在每日任务弹窗上方，导致无法点击任务按钮）
# 使用 template 匹配关闭按钮（右上角 X），避免 OCR 误识别主界面小字"惊喜礼包"。
close_surprise_gift: &close_surprise_gift
  name: 关闭惊喜礼包弹窗
  action: if_found
  find:
    type: ocr
    text: "惊喜礼包翻倍领取"
    roi: [125, 275, 480, 80]   # OCR box: (147,292)-(581,341)，留余量
    threshold: 0.8
  then_steps:
    - name: 点击惊喜礼包关闭按钮
      action: tap
      find:
        type: template
        template: close_btn_surprise_gift.png
        process: raw
        threshold: 0.85
        roi: [600, 180, 70, 70]
      wait_after: 2

# 可复用：点击"去完成"后，页面顶部可能出现广告倒计时：
# "xx秒后点击广告得丰富奖励" → 等待变成 "点击立得丰富奖励" → 点击。
# 如果未检测到该广告文案，则执行正常的 browse 浏览动作。
handle_ad_reward: &handle_ad_reward
  name: 处理广告奖励
  action: if_found
  find:
    type: ocr
    text:
      - "秒后点击广告得丰富奖励"
      - "点击立得丰富奖励"
    roi: [0, 0, 720, 220]      # 顶部倒计时文字区域
    threshold: 0.5
  then_steps:
    - name: 等待广告可点击
      action: wait_until_found
      find:
        type: ocr
        text: "点击立得丰富奖励"
        roi: [0, 0, 720, 220]
        threshold: 0.5
      interval: 1
      timeout: 15
      timeout_action: skip
      then_steps:
        - name: 点击立得丰富奖励
          action: tap
          find:
            type: ocr
            text: "点击立得丰富奖励"
            roi: [0, 0, 720, 220]
            threshold: 0.5
          wait_after: 2

# 可复用：滚动查找并点击"去领取"
# stop_scroll_if_found: 当前屏没有"去领取"但有"去完成"时，说明"去领取"已全部领完，
# 立即停止滑动，让后续步骤处理"去完成"任务，避免无效翻页。
scroll_find_go_claim: &scroll_find_go_claim
  name: 滚动查找并点击去领取
  action: scroll_find
  break_loop_if_not_found: true
  find:
    type: ocr
    text: "去领取"
    roi: [25, 680, 670, 870]   # 每日任务滚动列表区
    threshold: 0.5
    exact_match: true
  stop_scroll_if_found:
    type: ocr
    text: "去完成"
    roi: [25, 680, 670, 870]
    threshold: 0.5
  max_swipes: 6
  swipe_coords: [360, 1130, 360, 800, 500]  # 小幅上滑（约330px），duration 加长减少惯性
  swipe_wait: 5.0                            # 等待页面惯性滚动停止
  reset_scroll:                              # 开始前滑回顶部
    swipes: 5
    swipe_coords: [360, 700, 360, 1400, 300]  # 大幅下滑快速回顶部
    swipe_wait: 2.0
  wait_after: 2

# 可复用：滚动查找并点击"去完成"
# 使用时需覆盖 anchor_text 为具体任务名称
scroll_find_go_finish: &scroll_find_go_finish
  name: 滚动查找并点击去完成
  action: scroll_find
  break_loop_if_not_found: true
  anchor_text: "浏览优惠活动"  # 默认值，使用时覆盖
  target_text: "去完"       # "去完成" 的成字可能会被手型光标遮挡，用子串匹配兼容两种情况
  anchor_roi: [25, 680, 670, 870]   # 在滚动列表区内查找任务名称
  y_range: 80
  x_range: [300, 720]
  threshold: 0.5
  exact_match: false
  max_swipes: 6
  swipe_coords: [360, 1130, 360, 800, 500]  # 小幅上滑（约330px），duration 加长减少惯性
  swipe_wait: 5.0                            # 等待页面惯性滚动停止
  reset_scroll:                              # 开始前滑回顶部
    swipes: 5
    swipe_coords: [360, 700, 360, 1400, 300]  # 大幅下滑快速回顶部
    swipe_wait: 2.0
  wait_after: 2

steps:
  # ===== 打开每日任务弹窗 =====
  - name: 点击任务按钮
    action: tap
    find:
      type: ocr
      text: "任务"
      roi: [500, 1400, 180, 120]  # 底部右侧"任务"按钮区域
      threshold: 0.4
    offset_y: -40                  # 向上偏移40像素，点击文字上方的图标
    wait_after: 2                 # 等待"每日任务"弹窗

  # 关闭可能覆盖在每日任务弹窗上方的"惊喜礼包"弹窗
  - <<: *close_surprise_gift

  # ===== 第一阶段：领取所有"去领取"奖励 =====
  # 每次迭代：确保在弹窗 → 关闭惊喜礼包 → 滚动查找"去领取" → 检测放置区满
  - name: 领取去领取奖励
    loop: 50
    loop_steps:
      - name: 确保在弹窗中
        action: ensure_page
        target_page: daily_task_popup
        max_back_attempts: 2
        recovery: return_to_game_main
        entry_find:
          type: ocr
          text: "任务"
          roi: [500, 1400, 180, 120]
          threshold: 0.4
        entry_wait: 2
      - <<: *close_surprise_gift
      - <<: *scroll_find_go_claim
      - <<: *check_and_merge

  # 关闭可能残留的弹窗
  - page: congrats_popup
    fallback: {action: skip}
    wait_after: 2

  # ===== 第二阶段：逐个完成浏览任务 =====
  # 每个浏览任务的循环结构：
  #   ensure_page → 关闭惊喜礼包 → 滚动查找anchor+去完成 → 检测放置区满 →
  #   验证是否离开弹窗（若仍在弹窗则跳过浏览，避免无效滑动） →
  #   处理广告奖励 / browse 浏览 → 返回 → 处理弹窗

  # 4. 浏览优惠活动（多次任务，浏览 12 秒）
  - name: 浏览优惠活动
    loop: 20
    loop_steps:
      - name: 确保在弹窗中
        action: ensure_page
        target_page: daily_task_popup
        max_back_attempts: 2
        recovery: return_to_game_main
        entry_find:
          type: ocr
          text: "任务"
          roi: [500, 1400, 180, 120]
          threshold: 0.4
        entry_wait: 2
      - <<: *close_surprise_gift
      - <<: *scroll_find_go_finish
        name: 滚动查找浏览优惠活动去完成
        anchor_text: "浏览优惠活动"
      - <<: *check_and_merge
      - name: 验证是否已离开每日任务弹窗
        action: if_found
        find:
          type: ocr
          text: "每日任务"
          roi: [250, 450, 220, 120]   # 弹窗标题区域
          threshold: 0.4
        then_steps:
          - name: 仍在弹窗中，跳过浏览
            action: wait
            duration: 1
        else_steps:
          - <<: *handle_ad_reward
            else_steps:
              - name: 检测广告浏览弹窗
                page: browse_ad_popup
                fallback: {action: skip}
              - name: 等待浏览
                action: browse
                duration: 12
          - name: 返回每日任务弹窗
            action: return_to_task
            wait_after: 2
          - <<: *close_mgc_overlay
          - name: 处理去看看弹窗
            page: browse_congrats_popup
            fallback: {action: skip}
          - name: 关闭开心收下弹窗
            page: congrats_popup
            fallback: {action: skip}

  # 5. 下单领奖励（单次，浏览 12 秒）
  - name: 下单领奖励
    loop: 1
    loop_steps:
      - name: 确保在弹窗中
        action: ensure_page
        target_page: daily_task_popup
        max_back_attempts: 2
        recovery: return_to_game_main
        entry_find:
          type: ocr
          text: "任务"
          roi: [500, 1400, 180, 120]
          threshold: 0.4
        entry_wait: 2
      - <<: *close_surprise_gift
      - <<: *scroll_find_go_finish
        name: 滚动查找下单领奖励去完成
        anchor_text: "下单领奖励"
        anchor_same_line: "浏览得精灵球"  # 同行必须有此文本，区分其他"下单领奖励"任务
      - <<: *check_and_merge
      - name: 验证是否已离开每日任务弹窗
        action: if_found
        find:
          type: ocr
          text: "每日任务"
          roi: [250, 450, 220, 120]
          threshold: 0.4
        then_steps:
          - name: 仍在弹窗中，跳过浏览
            action: wait
            duration: 1
        else_steps:
          - <<: *handle_ad_reward
            else_steps:
              - name: 检测广告浏览弹窗
                page: browse_ad_popup
                fallback: {action: skip}
              - name: 等待浏览
                action: browse
                duration: 12
          - name: 返回每日任务弹窗
            action: return_to_task
            wait_after: 2
          - <<: *close_mgc_overlay
          - name: 处理去看看弹窗
            page: browse_congrats_popup
            fallback: {action: skip}
          - name: 关闭开心收下弹窗
            page: congrats_popup
            fallback: {action: skip}

  # 6. 浏览页面领奖励（多次任务，浏览 12 秒）
  - name: 浏览页面领奖励
    loop: 20
    loop_steps:
      - name: 确保在弹窗中
        action: ensure_page
        target_page: daily_task_popup
        max_back_attempts: 2
        recovery: return_to_game_main
        entry_find:
          type: ocr
          text: "任务"
          roi: [500, 1400, 180, 120]
          threshold: 0.4
        entry_wait: 2
      - <<: *close_surprise_gift
      - <<: *scroll_find_go_finish
        name: 滚动查找浏览页面领奖励去完成
        anchor_text: "浏览页面领奖励"
      - <<: *check_and_merge
      - name: 验证是否已离开每日任务弹窗
        action: if_found
        find:
          type: ocr
          text: "每日任务"
          roi: [250, 450, 220, 120]
          threshold: 0.4
        then_steps:
          - name: 仍在弹窗中，跳过浏览
            action: wait
            duration: 1
        else_steps:
          - <<: *handle_ad_reward
            else_steps:
              - name: 检测广告浏览弹窗
                page: browse_ad_popup
                fallback: {action: skip}
              - name: 等待浏览
                action: browse
                duration: 12
          - name: 返回每日任务弹窗
            action: return_to_task
            wait_after: 2
          - <<: *close_mgc_overlay
          - name: 处理去看看弹窗
            page: browse_congrats_popup
            fallback: {action: skip}
          - name: 关闭开心收下弹窗
            page: congrats_popup
            fallback: {action: skip}

  # 7. 点外卖好饭领红包（单次，浏览 12 秒）
  - name: 点外卖好饭领红包
    loop: 1
    loop_steps:
      - name: 确保在弹窗中
        action: ensure_page
        target_page: daily_task_popup
        max_back_attempts: 2
        recovery: return_to_game_main
        entry_find:
          type: ocr
          text: "任务"
          roi: [500, 1400, 180, 120]
          threshold: 0.4
        entry_wait: 2
      - <<: *close_surprise_gift
      - <<: *scroll_find_go_finish
        name: 滚动查找点外卖好饭领红包去完成
        anchor_text: "点外卖好饭领红包"
      - <<: *check_and_merge
      - name: 验证是否已离开每日任务弹窗
        action: if_found
        find:
          type: ocr
          text: "每日任务"
          roi: [250, 450, 220, 120]
          threshold: 0.4
        then_steps:
          - name: 仍在弹窗中，跳过浏览
            action: wait
            duration: 1
        else_steps:
          - <<: *handle_ad_reward
            else_steps:
              - name: 检测广告浏览弹窗
                page: browse_ad_popup
                fallback: {action: skip}
              - name: 等待浏览
                action: browse
                duration: 12
          - name: 返回每日任务弹窗
            action: return_to_task
            wait_after: 2
          - <<: *close_mgc_overlay
          - name: 处理去看看弹窗
            page: browse_congrats_popup
            fallback: {action: skip}
          - name: 关闭开心收下弹窗
            page: congrats_popup
            fallback: {action: skip}

  # 8. 外卖浏览下单（单次，浏览 12 秒）
  - name: 外卖浏览下单
    loop: 1
    loop_steps:
      - name: 确保在弹窗中
        action: ensure_page
        target_page: daily_task_popup
        max_back_attempts: 2
        recovery: return_to_game_main
        entry_find:
          type: ocr
          text: "任务"
          roi: [500, 1400, 180, 120]
          threshold: 0.4
        entry_wait: 2
      - <<: *close_surprise_gift
      - <<: *scroll_find_go_finish
        name: 滚动查找外卖浏览下单去完成
        anchor_text: "外卖浏览下单"
      - <<: *check_and_merge
      - name: 验证是否已离开每日任务弹窗
        action: if_found
