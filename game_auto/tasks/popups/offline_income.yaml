# 任务：处理主界面离线收益弹窗
name: 离线收益弹窗
description: 点击"额外领大量红包"→浏览10~15秒→按返回键→点击"开心收下"

# 注意：离线收益处理完后可能弹出"恭喜获得"弹窗（再合10次可领取），
# 该弹窗可能连续弹出多次，每次点"开心收下"后又弹新的。
# 这里只点一次"开心收下"关闭当前弹窗，剩余的由 handle_main_popups 循环处理。

steps:
  # 1. 点击"额外领大量红包"按钮，进入浏览页面
  - name: 点击额外领大量红包
    find:
      type: ocr
      text: "额外领大量红包"
      roi: [0, 900, 720, 660]  # 弹窗底部按钮区域
      threshold: 0.5
    action: tap
    wait_after: 12            # 等待浏览10~15秒

  # 2. 浏览完毕，按返回键返回，触发"恭喜获得"弹窗
  - name: 按返回键
    action: back
    wait_after: 2

  # 3. 点击"开心收下"关闭当前恭喜获得弹窗
  - name: 点击开心收下
    find:
      type: ocr
      text: "开心收下"
      roi: [0, 1000, 720, 560]  # 恭喜获得弹窗底部按钮区域（y 坐标 1053-1154）
      threshold: 0.5
    action: tap
    wait_after: 2
