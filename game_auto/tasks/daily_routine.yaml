name: 每日日常
description: 天天现金主要任务：启动 → 处理弹窗 → 合成 → 捕捉 → 合成 → 处理弹窗 → 领取任务

# 流程说明：
# 1. 启动并进入天天现金（自动打开美团小程序）
# 2. 处理主界面弹窗：离线收益、连续签到、限时福利等
# 3. 一键合成：先清空放置区，腾出空间
# 4. 捕捉精灵：捕捉精灵 → 幸运捕捉弹窗 → 去捕捉 → 确认 → 免费升级 → 浏览 → 返回
# 5. 再次一键合成：捕捉后如精灵满，合成腾出空间
# 6. 再次处理弹窗：捕捉后返回主界面可能触发新弹窗（离线收益等）
# 7. 领取每日任务：去领取 + 浏览任务（多种类型），内部可检测精灵满并合成
#
# ⚠️ 主界面有滚动轮播区域 (x:120, y:280, 宽~450, 高~220)
#    内容：重置专属奖励、从美团币入口访问、幸运红包、惊喜礼包
#    不是弹窗！不能关闭！弹窗检测ROI必须避开此区域(y<530)
#
# 子任务失败不阻断后续任务（非关键任务失败可跳过）

sub_tasks:
  # 1. 启动并进入天天现金（自动打开美团小程序）
  - launch_and_enter.yaml

  # 2. 处理主界面弹窗：离线收益、连续签到、限时福利等
  - handle_main_popups.yaml

  # 3. 一键合成：先清空放置区，腾出空间
  - merge_all.yaml

  # 4. 捕捉精灵：捕捉精灵 → 幸运捕捉 → 浏览 → 返回主界面
  - catch_spirit.yaml

  # 5. 捕捉后如精灵满，再次合成腾出空间
  - merge_all.yaml

  # 6. 捕捉后返回主界面可能触发新弹窗（如离线收益、签到等），再次处理
  - handle_main_popups.yaml

  # 7. 领取每日任务：去领取 + 浏览任务（多种类型）
  - claim_daily_task.yaml
